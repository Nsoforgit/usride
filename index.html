<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#5B21B6" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="UNIBEN Ride" />
    <meta name="description" content="UNIBEN Ride — Driving Smart Around UNIBEN Campus. Book solar-powered Kekes and Campus Cabs instantly." />
    <title>UNIBEN Ride — Smart Campus Transport</title>

    <!--
      ─── PERFORMANCE OPTIMISATIONS ────────────────────────────────────────────
      1. preconnect: start the TLS handshake with critical domains BEFORE
         the browser even discovers the scripts need them. Saves 200-500ms
         on mobile networks.
      2. dns-prefetch: cheaper fallback for browsers that don't support
         preconnect. Only resolves DNS, no TLS.
      ─────────────────────────────────────────────────────────────────────────
    -->
    <link rel="preconnect" href="https://maps.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://maps.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://js.paystack.co" crossorigin />
    <link rel="dns-prefetch" href="https://paltenvcnqtqezvbpkxy.supabase.co" />

    <!--
      ─── GOOGLE MAPS (async + best-practice loading pattern) ─────────────────
      BEFORE: <script src="...?libraries=places"> — synchronous, blocked HTML
              parsing, AND showed the yellow console warning.
      AFTER:  The `loading=async` attribute tells the Maps JS SDK to use the
              new asynchronous bootstrap API (importLibrary). This eliminates
              the console warning and no longer blocks the main thread.
              `callback=Function.prototype` suppresses the missing-callback
              error while still being effectively a no-op.
      ─────────────────────────────────────────────────────────────────────────
    -->
    <script
      async
      defer
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBAf1ytrEZjvqOVpHwmmO5Xb5GUzdy5AB0&libraries=places&loading=async&callback=Function.prototype"
    ></script>

    <!--
      ─── PAYSTACK (deferred — loaded after HTML is parsed) ───────────────────
      BEFORE: <script src="..."> — blocked HTML parsing.
      AFTER:  `defer` tells the browser to download in parallel but only
              EXECUTE after the HTML is fully parsed. This means the React
              bundle is already hydrating while Paystack loads. Zero blocking.
      ─────────────────────────────────────────────────────────────────────────
    -->
    <script defer src="https://js.paystack.co/v1/inline.js"></script>
  </head>
  <body style="margin:0;padding:0;background-color:#0f0a2e;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
